
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Lotto & AI Animal Face Test</title>
    <meta name="google-adsense-account" content="ca-pub-7396940152018800">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7396940152018800"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        // 초기 테마 설정
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            console.log('Theme changed:', isDark ? 'dark' : 'light');
        }
    </script>
</head>
<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="nav-logo">
                <a href="index.html">🍀 MY APP</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">로또 추첨</a></li>
                <li><a href="animal-test.html">동물상 테스트</a></li>
            </ul>
            <div class="nav-actions">
                <button onclick="toggleTheme()" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
                    <span class="icon">🌓</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="content-wrapper">
        <div class="app-container">
            <h1>로또 번호 추첨기</h1>
            <button id="draw-btn">번호 추첨</button>
            <div id="result-container"></div>
        </div>

        <div class="contact-container">
            <h2>제휴 문의</h2>
            <p>비즈니스 제휴 및 기타 문의사항을 남겨주세요.</p>
            <form action="https://formspree.io/f/maqpoqza" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" placeholder="성함 또는 업체명을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의 내용을 상세히 적어주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </div>

        <div class="comments-container">
            <h2>댓글 피드백</h2>
            <div id="disqus_thread"></div>
            <script>
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://mindyy.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
