
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // 페이지 로드 시 테마 설정 초기화 (FOUC 방지)
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            console.log('Theme toggled to:', isDark ? 'dark' : 'light');
        }
    </script>
</head>
<body>
    <div class="app-container">
        <div class="header-actions">
            <button onclick="toggleTheme()" class="theme-toggle" aria-label="Toggle Dark Mode">
                <span class="mode-icon">🌓</span>
                <span class="mode-text">다크/화이트 모드 전환</span>
            </button>
        </div>
        <h1>로또 번호 추첨기</h1>
        <button id="draw-btn">번호 추첨</button>
        <div id="result-container"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
